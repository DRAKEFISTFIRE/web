<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact — Aniol Rodríguez</title>
<link rel="icon" href="images/favicon.png" type="image/x-icon">
<link rel="stylesheet" href="./css/portfolio.css">
<link rel="stylesheet" href="./css/contact.css">
<link rel="stylesheet" href="./css/portfolio.css">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:wght@300&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>


<div id="cursor"></div>
<div id="cursor-ring"></div>
<div id="stars"></div>

<div class="contact-hero">

  <a href="portfolio.html#services" class="nav-back">
    <i class="fa-solid fa-arrow-left"></i>
    BACK
  </a>

  <div class="contact-overlay"></div>

  <div class="contact-content">

    <div class="contact-status">
      <span class="contact-dot"></span>
      AVAILABLE FOR PROJECTS
    </div>

    <h1 id="serviceTitle" class="contact-title">SERVICE</h1>

    <p id="serviceSubtitle" class="contact-subtitle"></p>

    <div id="serviceTags" class="contact-tags"></div>

  </div>
</div>

<section class="contact-body">

  <!-- FORM -->
  <div class="contact-main">

    <div class="contact-section">
      <div class="pd-section-tag">01 — ABOUT THE PROJECT</div>
      <p id="serviceDescription" class="contact-description"></p>
    </div>

<form class="contact-form" id="contactForm">

<div class="form-group">
  <label>Name</label>
  <input id="name" type="text">
  <div class="field-error" id="nameError"></div>
</div>

<div class="form-group">
  <label>Email</label>
  <input id="email" type="email">
  <div class="field-error" id="emailError"></div>
</div>

<div class="form-group">
  <label>Client Type</label>
  <select id="clientType">
      <option value="personal">Personal</option>
      <option value="company">Company</option>
      <option value="freelancer">Freelancer</option>
      <option value="other">Other</option>
  </select>
  <div class="field-error" id="clientTypeError"></div>
</div>

<div class="form-group" id="companyField" style="display:none;">
  <label>Company / Organization</label>
  <input id="company" type="text" placeholder="Your company name">
  <div class="field-error" id="companyError"></div>
</div>

<div class="form-group">
  <label>Country</label>
  <input id="country" type="text">
  <div class="field-error" id="countryError"></div>
</div>

...

<div class="form-group">
  <label>Deadline</label>
  <input id="deadline" type="date">
  <div class="field-error" id="deadlineError"></div>
</div>

<div class="form-group">
  <label>Project Description</label>
  <textarea id="projectDescription" rows="8"></textarea>
  <div class="field-error" id="projectDescriptionError"></div>
</div>

<div id="dynamicFields"></div>


<button type="submit" class="contact-submit">
  SEND REQUEST
  <i class="fa-solid fa-arrow-right"></i>
</button>

</form>

  </div>

  <!-- ASIDE -->
  <aside class="contact-aside">

    <div class="contact-card">
      <div class="contact-card-title">SUMMARY</div>

      <div class="summary-row">
        <span>Service</span>
        <strong id="summaryService"></strong>
      </div>

      <div class="summary-row">
        <span>Response</span>
        <strong>24h</strong>
      </div>

      <div class="summary-row">
        <span>Location</span>
        <strong>Barcelona</strong>
      </div>
    </div>

    <div class="contact-card">
      <div class="contact-card-title">CONTACT</div>

      <div class="quick-links">
        <a href="mailto:aniolrodriguez2005@gmail.com">Email <i class="fa-solid fa-arrow-up-right-from-square"></i></a>
        <a href="tel:+34637510005">Phone <i class="fa-solid fa-phone"></i></a>
        <a href="https://github.com/DRAKEFISTFIRE">GitHub <i class="fa-brands fa-github"></i></a>
      </div>
    </div>

  </aside>

</section>
<script src="./js/portfolio.js"></script>
<script src="./js/contact.js"></script>
<script>
  const cursor = document.getElementById('cursor');
  const ring   = document.getElementById('cursor-ring');

  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX - 6  + 'px';
    cursor.style.top  = e.clientY - 6  + 'px';
    ring.style.left   = e.clientX - 18 + 'px';
    ring.style.top    = e.clientY - 18 + 'px';
  });
</script>
</body>
</html>
